version: "2.0"

action_tiers:
  emergency_now:
    urgency: "建议立即就医或呼叫急救。"
    steps:
      - action: "立即拨打 120/999/911 或直接前往急诊"
        reason: "当前症状提示可能存在急性神经系统风险。"
      - action: "记录症状最早开始的时间"
        reason: "急诊评估会高度依赖起病时间。"
      - action: "不要自行开车前往"
        reason: "症状可能在途中加重。"

  same_day_review:
    urgency: "建议今天内尽快就医。"
    steps:
      - action: "今天联系门诊或急诊进行评估"
        reason: "症状需要较快的专业判断。"
      - action: "整理目前的症状和用药清单"
        reason: "方便医生快速判断。"

  prompt_follow_up:
    urgency: "建议尽快预约医生评估。"
    steps:
      - action: "48 小时内预约门诊"
        reason: "症状需要专业评估，但目前未见急救级别红旗。"
      - action: "记录症状是否加重"
        reason: "便于后续判断病程。"

  prompt_clinical_review:
    urgency: "建议尽快预约医生评估。"
    steps:
      - action: "尽快预约门诊或相关专科评估"
        reason: "症状需要专业评估，但目前未见急救级别红旗。"
      - action: "记录症状开始时间、变化速度和是否影响日常生活"
        reason: "这些信息有助于医生判断下一步检查和处理。"

  monitor:
    urgency: "目前可先观察，但如果加重应尽快就医。"
    steps:
      - action: "继续观察并记录症状变化"
        reason: "如果出现新红旗或明显加重，需要升级处理。"

  educate:
    urgency: "当前以健康教育和观察为主。"
    steps:
      - action: "先了解相关症状和警示信号"
        reason: "帮助判断后续是否需要就医。"
